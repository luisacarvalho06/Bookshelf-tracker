<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bookshelf Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="slider-container">

        <div class="slider-actions">
            <button onclick="exportBooks()">Exportar</button>
            <label class="import-btn">Importar
                <input type="file" accept=".zip" onchange="importBooks(event)" hidden>
            </label>
        </div>

        <div class="slider-wrapper">
            <button class="arrow left-arrow" onclick="prevSlide()">&#8592;</button>

            <div class="slider">

                <!-- Card de adicionar -->
                <div class="card add-card" id="add-card">
                    <div class="add-face" id="add-face">
                        <span class="plus-icon">+</span>
                        <p>Adicionar livro</p>
                    </div>
                    <div class="form-face hidden" id="form-face">
                        <div class="form-left">
                            <label class="img-upload" id="img-label">
                                <input type="file" id="img-input" accept="image/*" onchange="previewImage(event)">
                                <i class="fa-regular fa-image"></i>
                                <span>capa</span>
                                <img id="img-preview" alt="Capa">
                            </label>
                        </div>
                        <div class="form-right">
                            <div style="position:relative">
                                <div style="display:flex;gap:6px;align-items:center">
                                    <input type="text" id="f-title" placeholder="Título do livro" style="flex:1">
                                    <button type="button" class="omdb-btn" onclick="searchBook()">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                                            <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                                        </svg>
                                    </button>
                                </div>
                                <div id="search-dropdown" class="hidden" style="
                                    position:absolute;
                                    top:100%;
                                    left:0;
                                    right:0;
                                    background:#1e1e1e;
                                    border:1px solid #444;
                                    border-radius:6px;
                                    max-height:200px;
                                    overflow-y:auto;
                                    z-index:100;
                                "></div>
                            </div>
                            <input type="text" id="f-author" placeholder="Autor">
                            <div class="form-row">
                                <select id="f-genre">
                                    <option value="">Gênero</option>
                                    <option>Romance</option>
                                    <option>Ficção Científica</option>
                                    <option>Fantasia</option>
                                    <option>Terror</option>
                                    <option>Mistério</option>
                                    <option>Biografia</option>
                                    <option>Autoajuda</option>
                                    <option>História</option>
                                    <option>Outro</option>
                                </select>
                            </div>
                            <div class="form-row">
                                <div class="date-field">
                                    <label>Publicação</label>
                                    <input type="number" id="f-year" placeholder="2024" min="1000" max="2100">
                                </div>
                                <div class="date-field">
                                    <label>Lido em</label>
                                    <input type="date" id="f-read">
                                </div>
                            </div>
                            <div class="stars-input" id="stars-input">
                                <span onclick="setRating(1)">★</span>
                                <span onclick="setRating(2)">★</span>
                                <span onclick="setRating(3)">★</span>
                                <span onclick="setRating(4)">★</span>
                                <span onclick="setRating(5)">★</span>
                                <span onclick="setRating(6)">★</span>
                                <span onclick="setRating(7)">★</span>
                                <span onclick="setRating(8)">★</span>
                                <span onclick="setRating(9)">★</span>
                                <span onclick="setRating(10)">★</span>
                            </div>
                            <input type="hidden" id="f-rating" value="0">
                            <textarea id="f-review" placeholder="Sua review..."></textarea>
                            <div class="form-actions">
                                <button class="cancel-btn" onclick="toggleForm(event)">Cancelar</button>
                                <button class="save-btn" onclick="submitBook()">Salvar</button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <button class="arrow right-arrow" onclick="nextSlide()">&#8594;</button>
        </div>
        <div class="dots" id="dots"></div>
    </div>

    <script src="/static/main.js"></script>
</body>
</html>
